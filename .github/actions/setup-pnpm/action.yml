name: Setup pnpm workspace
description: Set up pnpm and Node.js, and install dependencies.

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v2
      with:
        version: 9

    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: pnpm

    - run: pnpm install --frozen-lockfile
      shell: bash
