name: Deploy

on:
  push:
    branches:
      - main

jobs:
  web-checks:
    name: ${{ matrix.command }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        command: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm --filter @bus/web run ${{ matrix.command }}

  build-web:
    needs: web-checks
    runs-on: ubuntu-latest
    env:
      VITE_PROXY_API_BASE_URL: ${{ vars.VITE_PROXY_API_BASE_URL }}
      VITE_GA_ID: ${{ vars.VITE_GA_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - uses: actions/configure-pages@v5
      - run: pnpm --filter @bus/web build
      - run: cp apps/web/build/client/index.html apps/web/build/client/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/build/client

  deploy:
    needs: build-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4
