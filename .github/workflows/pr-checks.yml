name: PR Checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  workspace-checks:
    name: ${{ matrix.workspace }} / ${{ matrix.command }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: '@bus/web'
            command: lint
          - workspace: '@bus/web'
            command: typecheck
          - workspace: '@bus/web'
            command: test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm --filter "${{ matrix.workspace }}" run ${{ matrix.command }}
